<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Name</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__title">App Name</h1>
      <p class="header__tagline">Tagline</p>
    </header>

    <section class="hero">
      <div class="hero__video">
        <p>Promo video placeholder</p>
      </div>
    </section>

    <section class="features">
      <h2>Features</h2>
      <div class="features__grid">
        <div class="features__item">Feature 1</div>
        <div class="features__item">Feature 2</div>
        <div class="features__item">Feature 3</div>
      </div>
    </section>

    <section class="about">
      <h2>Meet the Team</h2>
      <p>Team members and roles</p>
    </section>

    <section class="description">
      <h2>About the App</h2>
      <p>Full description</p>
    </section>

    <section class="download">
      <h2>Get Started</h2>
      <button>Download</button>
    </section>

    <section class="contact">
      <h2>Contact Us</h2>
      <form class="contact__form">
        <input type="text" placeholder="Name" />
        <input type="email" placeholder="Email" />
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
      </form>
    </section>

    <footer class="footer">
      <p>BCIT Student Project - 2026</p>
    </footer>
  </body>
</html>
